name: Supabase Schema Drift

on:
  pull_request:
    paths:
      - 'supabase/**'
      - 'src/types/supabase.generated.ts'
      - 'scripts/*supabase*.sh'
      - '.github/workflows/supabase-schema-drift.yml'
  push:
    branches: [main, master]
    paths:
      - 'supabase/**'
      - 'src/types/supabase.generated.ts'
      - 'scripts/*supabase*.sh'
      - '.github/workflows/supabase-schema-drift.yml'
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  schema-drift:
    name: Comparar schema remoto e tipos
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Validar secrets obrigatórios
        shell: bash
        run: |
          if [[ -z "$SUPABASE_ACCESS_TOKEN" || -z "$SUPABASE_PROJECT_ID" ]]; then
            echo "Configure SUPABASE_ACCESS_TOKEN e SUPABASE_PROJECT_ID nos secrets do repositório." >&2
            exit 1
          fi

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verificar divergência do schema
        run: bash scripts/check-supabase-schema.sh